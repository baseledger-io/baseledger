# Default dispatcher (Nested inside pekko.actor namespace)
pekko.actor.default-dispatcher {
  fork-join-executor {
    parallelism-factor = ${?PEKKO_DEFAULT_DISPATCHER_PARALLELISM_FACTOR}
    parallelism-max = ${?PEKKO_DEFAULT_DISPATCHER_PARALLELISM_MAX}
  }
  throughput = ${?PEKKO_DEFAULT_DISPATCHER_THROUGHPUT}
}

# Dedicated dispatcher for projection operations
projection-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = ${?PROJECTION_DISPATCHER_FIXED_POOL_SIZE}
  }
  throughput = 1
}

# Dedicated dispatcher for read-side database operations:
# HTTP GET, health probe, metrics gauge, hold-expiration poll, and the
# persistence READ journal/query plugin. Writes now use their own dispatcher
# (see write-persistence-dispatcher) so a read burst can't delay journal writes.
database-reader-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = ${?READ_R2DBC_POOL_MAX_SIZE}
  }
  throughput = 1
}

# Dedicated dispatcher for write-side persistence (journal + snapshot writes).
# Isolated from the read-side pool so command-persistence callbacks are not
# contended by HTTP reads / projection queries and vice-versa.
write-persistence-dispatcher {
  type = Dispatcher
  executor = "thread-pool-executor"
  thread-pool-executor {
    fixed-pool-size = ${?WRITE_PERSISTENCE_DISPATCHER_FIXED_POOL_SIZE}
  }
  throughput = 1
}
