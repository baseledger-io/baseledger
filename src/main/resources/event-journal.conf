pekko.persistence.journal.plugin = "pekko.persistence.r2dbc.journal"
pekko.persistence.snapshot-store.plugin = "pekko.persistence.r2dbc.snapshot"
pekko.persistence.state.plugin = "pekko.persistence.r2dbc.state"

pekko.persistence.r2dbc {
  journal.plugin-dispatcher = "write-persistence-dispatcher"
  query.plugin-dispatcher = "database-reader-dispatcher"
  snapshot.plugin-dispatcher = "write-persistence-dispatcher"

  dialect = "postgres"
  connection-factory = ${pekko.persistence.r2dbc.connection-factory} {
    driver = "postgres"
    host = ${POSTGRES_HOST}
    port = ${POSTGRES_PORT}
    database = ${POSTGRES_DB}
    user = ${POSTGRES_USER}
    password = ${POSTGRES_PASSWORD}

    # Write-side (journal/snapshot) connection pool.
    max-size = ${R2DBC_POOL_MAX_SIZE}
    initial-size = ${R2DBC_POOL_INITIAL_SIZE}
  }
}

read-side-connection-factory = ${pekko.persistence.r2dbc.connection-factory} {
  driver = "postgres"
  host = ${POSTGRES_HOST}
  port = ${POSTGRES_PORT}
  database = ${POSTGRES_DB}
  user = ${POSTGRES_USER}
  password = ${POSTGRES_PASSWORD}

  max-size = ${READ_R2DBC_POOL_MAX_SIZE}
  initial-size = ${READ_R2DBC_POOL_INITIAL_SIZE}
}

# Run the wallet projection (read-model upserts + offset commits) on the read-side
# pool instead of the journal's write pool. By default pekko-projection-r2dbc shares
# the write connection-factory, so projection upserts would compete with event_journal
# inserts for the write pool. Pointing it at the read-side factory keeps journal and
# projection on separate pools.
pekko.projection.r2dbc.use-connection-factory = "read-side-connection-factory"
