services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "3210:5432"
    environment:
      POSTGRES_USER: baseledger
      POSTGRES_PASSWORD: password
      POSTGRES_DB: baseledger
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U baseledger -d baseledger"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - baseledger-net

  migrations:
    image: flyway/flyway:12-alpine
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src/main/resources/db/migrations:/flyway/migrations
    command: -url=jdbc:postgresql://db:5432/baseledger -user=baseledger -password=password -locations=filesystem:/flyway/migrations -connectRetries=60 migrate
    networks:
      - baseledger-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/baseledger-io/baseledger:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: baseledger
      POSTGRES_USER: baseledger
      POSTGRES_PASSWORD: password
      HTTP_HOST: "0.0.0.0"
      HTTP_PORT: "8000"
      OTEL_TRACES_EXPORTER: ${OTEL_TRACES_EXPORTER:-none}
      OTEL_METRICS_EXPORTER: ${OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${OTEL_LOGS_EXPORTER:-none}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-baseledger}
    ports:
      - "8000:8000"
    stop_grace_period: 30s
    networks:
      - baseledger-net

volumes:
  db_data:

networks:
  baseledger-net:
    driver: bridge
