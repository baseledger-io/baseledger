rules = [
  OrganizeImports,
  DisableSyntax,
  LeakingImplicitClassVal,
  NoValInForComprehension
]

OrganizeImports {
  groupedImports = Merge
  expandRelative = true
  removeUnused = false
  groups = [
    "re:javax?\\.",
    "scala.",
    "org.apache.pekko.",
    "*"
  ]
}

DisableSyntax {
  noVars = true
  noThrows = true
  noNulls = true
  noReturns = true
  noWhileLoops = true
  noFinalVal = true
  noValPatterns = true
}
